name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '18'

jobs:
  ci:
    name: CI (Lint + Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ---- Lint ----
      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint --ignore-path .gitignore . || true
        continue-on-error: true

      - name: Check package.json completeness
        run: |
          echo "=== package.json completeness check ==="
          node -e "
            const pkg = require('./package.json');
            const required = ['name','version','description','main','scripts','dependencies'];
            const missing = required.filter(k => !pkg[k]);
            if (missing.length > 0) {
              console.error('Missing required fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('package.json is complete.');
          "

      # ---- Test ----
      - name: Check for tests directory
        id: has_tests
        run: |
          if [ -d "tests" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.has_tests.outputs.exists == 'true'
        run: npm test
        continue-on-error: true

      # ---- Security Audit ----
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # ---- Build ----
      - name: Install production dependencies
        run: npm install --production

      - name: Verify server.js syntax
        run: node --check server.js

      - name: Check critical files exist
        run: |
          echo "=== Critical files check ==="
          for f in server.js public/index.html package.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f is missing!"
              exit 1
            else
              echo "OK: $f"
            fi
          done
