name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '18'
  RENDER_SERVICE_ID: srv-d76h342dbo4c73bjvmu0

jobs:
  # ============================================================
  # CI — Lint, Test, Build
  # ============================================================
  ci:
    name: CI (Lint + Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ---- Lint ----
      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint --ignore-path .gitignore . || true
        continue-on-error: true

      - name: Check package.json completeness
        run: |
          echo "=== package.json completeness check ==="
          node -e "
            const pkg = require('./package.json');
            const required = ['name','version','description','main','scripts','dependencies'];
            const missing = required.filter(k => !pkg[k]);
            if (missing.length > 0) {
              console.error('Missing required fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('package.json is complete.');
          "

      # ---- Test (skip if no tests/ directory) ----
      - name: Check for tests directory
        id: has_tests
        run: |
          if [ -d "tests" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.has_tests.outputs.exists == 'true'
        run: npm test
        continue-on-error: true

      # ---- Security Audit ----
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # ---- Build ----
      - name: Install production dependencies
        run: npm install --production

      - name: Verify server.js syntax
        run: node --check server.js

      - name: Check critical files exist
        run: |
          echo "=== Critical files check ==="
          for f in server.js public/index.html package.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f is missing!"
              exit 1
            else
              echo "OK: $f"
            fi
          done

  # ============================================================
  # CD — Deploy to Render (master only)
  # ============================================================
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        id: trigger
        run: |
          echo "Triggering Render deployment..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys")

          echo "Response: $RESPONSE"

          # Extract deploy ID from response
          DEPLOY_ID=$(echo "$RESPONSE" | node -e "
            let input = '';
            process.stdin.on('data', d => input += d);
            process.stdin.on('end', () => {
              try {
                const j = JSON.parse(input);
                console.log(j.id || '');
              } catch(e) {
                console.log('');
              }
            });
          ")

          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Failed to trigger Render deployment. Check RENDER_API_KEY."
            exit 1
          fi

          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Deployment triggered: $DEPLOY_ID"

      - name: Wait for Render deployment to complete
        id: wait
        run: |
          MAX_WAIT=300  # 5 minutes
          INTERVAL=10
          ELAPSED=0
          DEPLOY_ID=${{ steps.trigger.outputs.deploy_id }}

          echo "Waiting for deployment $DEPLOY_ID to complete (max ${MAX_WAIT}s)..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/deploys/$DEPLOY_ID" \
              | node -e "
                let input = '';
                process.stdin.on('data', d => input += d);
                process.stdin.on('end', () => {
                  try {
                    const j = JSON.parse(input);
                    console.log(j.status || 'unknown');
                  } catch(e) {
                    console.log('unknown');
                  }
                });
              ")

            echo "[$(date +%T)] Deployment status: $STATUS"

            case "$STATUS" in
              succeeded)
                echo "Deployment succeeded!"
                exit 0
                ;;
              failed|canceled|build_failed)
                echo "::error::Deployment $STATUS"
                exit 1
                ;;
            esac

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::warning::Deployment check timed out after ${MAX_WAIT}s. Please verify manually on Render Dashboard."
          exit 0

      - name: Get Render service info and URL
        if: always()
        id: service_info
        run: |
          INFO=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}")

          SERVICE_NAME=$(echo "$INFO" | node -e "
            let input = '';
            process.stdin.on('data', d => input += d);
            process.stdin.on('end', () => {
              try {
                const j = JSON.parse(input);
                console.log(j.name || 'unknown');
              } catch(e) {
                console.log('unknown');
              }
            });
          ")

          SERVICE_URL=$(echo "$INFO" | node -e "
            let input = '';
            process.stdin.on('data', d => input += d);
            process.stdin.on('end', () => {
              try {
                const j = JSON.parse(input);
                console.log(j.serviceDetails?.customDomain
                  || j.serviceDetails?.url
                  || 'https://minimax-image-generator.onrender.com');
              } catch(e) {
                console.log('https://minimax-image-generator.onrender.com');
              }
            });
          ")

          echo "Service: $SERVICE_NAME"
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Render Dashboard: https://dashboard.render.com/web/${{ env.RENDER_SERVICE_ID }}"

      - name: Deployment health check
        if: steps.service_info.outputs.service_url != ''
        run: |
          SERVICE_URL="${{ steps.service_info.outputs.service_url }}"
          HEALTH_URL="${SERVICE_URL}/api/key-status"
          echo "Health checking: $HEALTH_URL"

          MAX_WAIT=60
          INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            echo "[$(date +%T)] HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed: service is responding correctly."
              exit 0
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::warning::Health check timed out after ${MAX_WAIT}s. Verify manually: $HEALTH_URL"
          exit 0

      - name: Report deployment failure via commit status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              target_url: 'https://dashboard.render.com/web/${{ env.RENDER_SERVICE_ID }}',
              description: 'Deployment to Render failed. Check logs for details.',
              context: 'render/deploy'
            });

      - name: Report deployment success via commit status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: '${{ steps.service_info.outputs.service_url }}',
              description: 'Successfully deployed to Render.',
              context: 'render/deploy'
            });
