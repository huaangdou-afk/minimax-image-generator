name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '20'
  RENDER_SERVICE_ID: srv-d76h342dbo4c73bjvmu0
  RENDER_DEPLOY_HOOK: https://api.render.com/deploy/srv-d76h342dbo4c73bjvmu0?key=pqcygdkHmWQ

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Lint + Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Single install — all deps (dev + prod), no duplicates
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            echo "Install attempt $i..."
            npm ci --ignore-scripts && echo "Install succeeded" && exit 0
            echo "Install failed, retrying..."
            sleep 5
          done
          echo "All install attempts failed"
          exit 1

      - name: Check package.json completeness
        run: |
          node -e "
            const pkg = require('./package.json');
            const required = ['name','version','description','main','scripts','dependencies'];
            const missing = required.filter(k => !pkg[k]);
            if (missing.length > 0) { console.error('Missing:', missing.join(', ')); process.exit(1); }
            console.log('package.json OK');
          "

      # Run lint, audit, and tests in parallel
      - name: Run ESLint
        run: npx eslint . --max-warnings 0
        continue-on-error: true

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Verify server.js syntax
        run: node --check server.js

      - name: Check critical files exist
        run: |
          for f in server.js public/index.html package.json; do
            [ -f "$f" ] || { echo "ERROR: $f missing"; exit 1; }
          done
          echo "All critical files present"

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      # Pre-warm current instance so Render can serve traffic during build transition
      - name: Pre-warm current instance
        run: |
          echo "Pre-warming current instance..."
          for i in 1 2 3; do
            RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              https://minimax-image-generator.onrender.com/api/key-status)
            echo "Warm ping $i: $RESP"
            [ "$RESP" = "200" ] && echo "Instance is warm ✓" && break
            sleep 3
          done

      - name: Trigger Render deployment
        run: |
          echo "Triggering Render deploy..."
          RESP=$(curl -s -m 30 "$RENDER_DEPLOY_HOOK")
          echo "Response: $RESP"
          if echo "$RESP" | grep -q "deployed"; then
            echo "Deploy triggered successfully"
          else
            echo "::warning::Deploy trigger response: $RESP"
          fi

      # Poll Render build status, then verify new instance is warm
      - name: Wait for deployment
        run: |
          MAX=240; INT=15; EL=0; DEPLOY_DONE=""
          while [ $EL -lt $MAX ]; do
            STATUS=$(curl -s -m 10 -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}" | \
              node -pe "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).activeDeploy?.status || 'unknown'")
            echo "[$EL/$MAX] Build: $STATUS"

            # Build succeeded — now wait for new instance to be warm
            if [ "$STATUS" = "succeeded" ] && [ -z "$DEPLOY_DONE" ]; then
              DEPLOY_DONE=1
              echo "Build complete, waiting for new instance to be warm..."
              for j in 1 2 3 4 5 6; do
                sleep 5
                RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
                  https://minimax-image-generator.onrender.com/api/key-status)
                echo "[post-deploy] warm check $j: $RESP"
                [ "$RESP" = "200" ] && echo "New instance is warm ✓" && exit 0
              done
              echo "Instance may still be cold, but build succeeded"
              exit 0
            fi

            [ "$STATUS" = "failed" ] && exit 1
            sleep $INT; EL=$((EL+INT))
          done
          echo "::warning::Timeout, check dashboard manually"

      - name: Report status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              target_url: 'https://dashboard.render.com/web/${{ env.RENDER_SERVICE_ID }}',
              description: 'Render deployment ' + ('${{ job.status }}' === 'success' ? 'succeeded' : 'failed'),
              context: 'render/deploy'
            });
