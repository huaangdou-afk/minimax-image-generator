<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-agent Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23E5450A'/><rect x='4' y='4' width='10' height='10' rx='2' fill='white' opacity='.9'/><rect x='18' y='4' width='10' height='10' rx='2' fill='white' opacity='.6'/><rect x='4' y='18' width='10' height='10' rx='2' fill='white' opacity='.6'/><rect x='18' y='18' width='10' height='10' rx='2' fill='white' opacity='.3'/></svg>" />
  <link rel="stylesheet" href="./css/dashboard.css" />
</head>
<body>

<header class="dash-header">
  <div class="dash-logo">
    <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
      <rect x="1" y="1" width="8" height="8" rx="1.5" fill="currentColor" opacity=".9"/>
      <rect x="11" y="1" width="8" height="8" rx="1.5" fill="currentColor" opacity=".6"/>
      <rect x="1" y="11" width="8" height="8" rx="1.5" fill="currentColor" opacity=".6"/>
      <rect x="11" y="11" width="8" height="8" rx="1.5" fill="currentColor" opacity=".3"/>
    </svg>
    Multi-agent Dashboard
  </div>
  <div class="dash-header-right">
    <span id="connStatus" class="conn-badge conn-connecting">⏳ 连接中</span>
    <button class="refresh-all-btn" onclick="refreshAll()">↻ 全部刷新</button>
  </div>
</header>

<main class="dash-grid" id="dashGrid">
  <!-- 16 cells injected by JS -->
</main>

<!-- Cell detail modal -->
<div class="cell-modal" id="cellModal">
  <div class="cell-modal-content">
    <button class="cell-modal-close" onclick="closeModal()">✕</button>
    <div class="cell-modal-icon" id="modalIcon"></div>
    <div class="cell-modal-name" id="modalName"></div>
    <div class="cell-modal-value" id="modalValue"></div>
    <div class="cell-modal-detail" id="modalDetail"></div>
    <div class="cell-modal-meta" id="modalMeta"></div>
    <button class="refresh-all-btn" style="margin-top:16px;font-size:12px;" onclick="refreshCell(_modalCurrentId); closeModal();">↻ 刷新此格</button>
  </div>
</div>

<script src="./js/dashboard.js"></script>
</body>
</html>
