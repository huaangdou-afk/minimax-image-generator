<script>
// ============================================================
// Service Worker Registration (caches static assets)
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('[SW] Registered:', reg.scope);
    }).catch(err => {
      console.warn('[SW] Registration failed (non-fatal):', err);
    });
  });
}

// ============================================================
// Utilities
// ============================================================
function escapeHtml(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function parseSize(r) {
  const [w,h] = r.split(':').map(Number);
  return { width: 1024, height: Math.round(1024 * h / w) };
}
async function apiCall(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `请求失败 (${res.status})`);
  return data;
}

// Generic debounce helper
function debounce(fn, delay) {
  let timer = null;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

// ============================================================
// Toast Notification System
// ============================================================
const toastContainer = document.getElementById('toastContainer');
const TOAST_ICONS = { error: '⚠', success: '✅', warning: '⚡' };

function showToast(msg, type = 'error', duration = 3500) {
  const toast = document.createElement('div');
  toast.className = 'toast' + (type === 'success' ? ' success' : type === 'warning' ? ' warning' : '');
  toast.innerHTML =
    '<span class="toast-icon">' + TOAST_ICONS[type] + '</span>' +
    '<span class="toast-msg">' + escapeHtml(msg) + '</span>' +
    '<button class="toast-close" aria-label="关闭">✕</button>';
  toastContainer.appendChild(toast);

  // Double rAF to ensure CSS transition picks up the new class
  requestAnimationFrame(() => {
    requestAnimationFrame(() => toast.classList.add('show'));
  });

  const autoHide = setTimeout(() => dismissToast(toast), duration);
  toast.querySelector('.toast-close').addEventListener('click', () => {
    clearTimeout(autoHide);
    dismissToast(toast);
  });
}

function dismissToast(toast) {
  if (!toast.classList.contains('show')) return;
  toast.classList.remove('show');
  toast.addEventListener('transitionend', () => toast.remove(), { once: true });
}

// ============================================================
// Tabs (sidebar + mobile nav)

function activateTab(tabName) {
  document.querySelectorAll('.nav-item[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.querySelectorAll('.mobile-nav-item[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tabName));
}
document.querySelectorAll('.nav-item[data-tab], .mobile-nav-item[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

// ============================================================
// Image Generation
// ============================================================
const imgPrompt       = document.getElementById('imgPrompt');
const imgCharCount    = document.getElementById('imgCharCount');
const presetTags      = document.getElementById('presetTags');
const imgSize         = document.getElementById('imgSize');
const imgSeed         = document.getElementById('imgSeed');
const btnRandomSeed   = document.getElementById('btnRandomSeed');
const btnGenerateImg  = document.getElementById('btnGenerateImg');
const imageDisplay    = document.getElementById('imageDisplay');
const imageActions    = document.getElementById('imageActions');
const btnDownload     = document.getElementById('btnDownload');
const btnCopy         = document.getElementById('btnCopy');
const btnDelete       = document.getElementById('btnDelete');
const imgHistoryList  = document.getElementById('imgHistoryList');
const imgGenTime      = document.getElementById('imgGenTime');
const imgHistoryCount = document.getElementById('imgHistoryCount');
const historyFooter   = document.getElementById('historyFooter');

let currentImageUrl = null;
let isGenerating    = false;

// ── History (localStorage, max 20, dedup) ──
const HISTORY_KEY = 'imgGenHistory';
const MAX_HISTORY  = 20;
let imgHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');

function saveHistory() {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(imgHistory));
}

function addToHistory(url) {
  // Remove if already exists (so it moves to front)
  imgHistory = imgHistory.filter(u => u !== url);
  imgHistory.unshift(url);
  if (imgHistory.length > MAX_HISTORY) imgHistory = imgHistory.slice(0, MAX_HISTORY);
  saveHistory();
  renderImgHistory();
}

function clearHistory() {
  imgHistory = [];
  saveHistory();
  renderImgHistory();
  showToast('历史记录已清空', 'success');
}

function renderImgHistory() {
  const count = imgHistory.length;
  imgHistoryCount.textContent = count > 0 ? count + ' 张' : '';
  historyFooter.style.display = count > 0 ? '' : 'none';

  if (count === 0) {
    imgHistoryList.innerHTML = '<div class="history-empty">暂无历史记录</div>';
    return;
  }

  imgHistoryList.innerHTML = imgHistory.map(u =>
    '<div class="history-item" data-url="' + escapeHtml(u) + '">' +
      '<img src="' + escapeHtml(u) + '" alt="h" loading="lazy"/>' +
      '<div class="history-overlay">👁</div>' +
    '</div>'
  ).join('');

  // Progressive image load for history thumbnails
  imgHistoryList.querySelectorAll('img').forEach(img => {
    if (img.complete) { img.classList.add('loaded'); }
    else { img.addEventListener('load', () => img.classList.add('loaded')); }
  });
}

document.getElementById('btnClearHistory').addEventListener('click', e => {
  e.stopPropagation();
  clearHistory();
});

renderImgHistory();

// ── Image render with progressive reveal ──
function renderImage(url, fromHistory) {
  imageDisplay.innerHTML = '';
  imageDisplay.classList.remove('has-image');
  imageActions.classList.remove('visible');

  // 1. Skeleton shimmer while loading
  const skeleton = document.createElement('div');
  skeleton.className = 'img-skeleton';
  imageDisplay.appendChild(skeleton);

  // 2. Main image (starts invisible)
  const img = document.createElement('img');
  img.src = url;
  img.alt = 'Generated';
  imageDisplay.appendChild(img);

  img.onload = () => {
    skeleton.remove();
    img.classList.add('loaded');
    imageDisplay.classList.add('has-image');
    imageActions.classList.add('visible');
    if (!fromHistory) {
      const now = new Date();
      imgGenTime.textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
  };
  img.onerror = () => {
    skeleton.remove();
    img.remove();
    imageDisplay.innerHTML =
      '<div class="img-error">' +
        '<div class="img-error-icon">⚠</div>' +
        '<div class="img-error-text">图片加载失败，可能是链接已过期</div>' +
        '<button class="img-error-retry" id="btnRetry">🔄 重试</button>' +
      '</div>';
    document.getElementById('btnRetry').addEventListener('click', () => generateImage());
    imageDisplay.classList.remove('has-image');
  };

  currentImageUrl = url;
  if (!fromHistory) addToHistory(url);
}

// ── Loading overlay ──
function showLoadingOverlay() {
  imageDisplay.querySelectorAll('.gen-loading-overlay, .img-skeleton, .img-error').forEach(el => el.remove());
  imageDisplay.classList.remove('has-image');
  imageActions.classList.remove('visible');
  imageDisplay.innerHTML =
    '<div class="gen-loading-overlay">' +
      '<div class="gen-loading-spinner"></div>' +
      '<div class="gen-loading-text">' +
        'AI 正在生成图片' +
        '<span class="gen-loading-dots"><span>.</span><span>.</span><span>.</span></span>' +
        '<em>预计需要 5-15 秒</em>' +
      '</div>' +
    '</div>';
}

// ── Core generation function ──
async function generateImage() {
  if (isGenerating) return;

  const prompt = imgPrompt.value.trim();
  if (!prompt) { showToast('请输入提示词', 'warning'); imgPrompt.focus(); return; }
  if (prompt.length > 1500) { showToast('提示词不能超过 1500 字', 'warning'); return; }

  isGenerating = true;
  btnGenerateImg.disabled = true;
  btnGenerateImg.innerHTML = '<span class="btn-spinner"></span> 生成中...';
  btnGenerateImg.classList.add('loading');
  showLoadingOverlay();

  try {
    const size = parseSize(imgSize.value);
    const seed = imgSeed.value ? parseInt(imgSeed.value) : undefined;
    const body = { model: 'image-01', prompt, width: size.width, height: size.height };
    if (seed) body.seed = seed;

    const data = await apiCall('/api/generate', body);
    const url = data.image_url;
    if (!url) throw new Error('未返回图片地址');

    renderImage(url);
    showToast('图片生成成功！', 'success');
  } catch(err) {
    imageDisplay.querySelectorAll('.gen-loading-overlay, .img-skeleton').forEach(el => el.remove());
    imageDisplay.innerHTML =
      '<div class="img-error">' +
        '<div class="img-error-icon">⚠</div>' +
        '<div class="img-error-text">' + escapeHtml(err.message) + '</div>' +
        '<button class="img-error-retry" id="btnRetry">🔄 重试</button>' +
      '</div>';
    document.getElementById('btnRetry').addEventListener('click', () => generateImage());
  } finally {
    isGenerating = false;
    btnGenerateImg.disabled = false;
    btnGenerateImg.innerHTML = '✦ 开始生成图片';
    btnGenerateImg.classList.remove('loading');
  }
}

// Debounced click handler (300ms) to prevent rapid-fire submissions
const debouncedGenerate = debounce(generateImage, 300);

btnGenerateImg.addEventListener('click', debouncedGenerate);
imgPrompt.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); debouncedGenerate(); }
});

// Character counter with overflow warning color
imgPrompt.addEventListener('input', () => {
  const len = imgPrompt.value.length;
  imgCharCount.textContent = len + ' / 1500';
  imgCharCount.style.color = len > 1500 ? 'var(--warning)' : '';
});

// Preset tags
presetTags.addEventListener('click', e => {
  const t = e.target.closest('.preset-tag');
  if (!t) return;
  document.querySelectorAll('.preset-tag').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  imgPrompt.value = t.dataset.prompt;
  imgCharCount.textContent = t.dataset.prompt.length + ' / 1500';
  imgPrompt.focus();
});

btnRandomSeed.addEventListener('click', () => {
  imgSeed.value = Math.floor(Math.random() * 999999999);
  showToast('已生成随机种子', 'success');
});

// Download (new tab)
btnDownload.addEventListener('click', async () => {
  if (!currentImageUrl) return;
  const a = document.createElement('a');
  a.href = currentImageUrl;
  a.download = 'ai-image-' + Date.now() + '.jpg';
  a.target = '_blank';
  a.click();
  showToast('已在新窗口打开，右键另存为', 'success');
});

// Copy link
btnCopy.addEventListener('click', () => {
  if (!currentImageUrl) return;
  navigator.clipboard.writeText(currentImageUrl)
    .then(() => showToast('图片地址已复制', 'success'))
    .catch(() => showToast('复制失败，请手动复制'));
});

// ── Image Preview Lightbox ──
const lightbox      = document.getElementById('lightbox');
const lightboxImg   = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');
const lightboxBackdrop = document.getElementById('lightboxBackdrop');
const lightboxDownload = document.getElementById('lightboxDownload');
const lightboxCopy    = document.getElementById('lightboxCopy');

function openLightbox(url) {
  lightboxImg.src = url;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
  lightboxClose.focus();
}
function closeLightbox() {
  lightbox.classList.remove('open');
  lightboxImg.src = '';
  document.body.style.overflow = '';
}

lightboxClose.addEventListener('click', closeLightbox);
lightboxBackdrop.addEventListener('click', closeLightbox);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox(); });

lightboxDownload.addEventListener('click', () => {
  const src = lightboxImg.src;
  if (!src) return;
  const a = document.createElement('a');
  a.href = src; a.download = 'ai-image-' + Date.now() + '.jpg'; a.target = '_blank'; a.click();
  showToast('已在新窗口打开，右键另存为', 'success');
});
lightboxCopy.addEventListener('click', () => {
  navigator.clipboard.writeText(lightboxImg.src).then(() => showToast('链接已复制', 'success')).catch(() => showToast('复制失败'));
});

// Main image click → open lightbox
imageDisplay.addEventListener('click', e => {
  const img = imageDisplay.querySelector('img[src]');
  if (!img || e.target === img) openLightbox(img.src);
});

// History item double-click → open lightbox (single click = restore image)
let lastClickTarget = null;
let lastClickTime = 0;
imgHistoryList.addEventListener('click', e => {
  const it = e.target.closest('.history-item');
  if (!it) return;
  const now = Date.now();
  if (lastClickTarget === it && now - lastClickTime < 350) {
    // Double-click → lightbox
    openLightbox(it.dataset.url);
  } else {
    // Single-click → restore image
    renderImage(it.dataset.url, true);
  }
  lastClickTarget = it;
  lastClickTime = now;
});

// Delete current image
btnDelete.addEventListener('click', () => {
  imageDisplay.innerHTML =
    '<div class="placeholder-icon">🎨</div>' +
    '<div class="placeholder-text">输入提示词开始生成<br/><small>生成的图片将显示在这里</small></div>';
  imageDisplay.classList.remove('has-image');
  imageActions.classList.remove('visible');
  currentImageUrl = null;
  imgGenTime.textContent = '';
});

// ============================================================
// TTS
// ============================================================
const ttsText           = document.getElementById('ttsText');
const ttsCharCount      = document.getElementById('ttsCharCount');
const voiceGrid         = document.getElementById('voiceGrid');
const ttsSpeed          = document.getElementById('ttsSpeed');
const ttsSpeedVal       = document.getElementById('ttsSpeedVal');
const btnSynthesize     = document.getElementById('btnSynthesize');
const ttsPlayer         = document.getElementById('ttsPlayer');
const ttsPlaceholder    = document.getElementById('ttsPlaceholder');
const ttsAudio          = document.getElementById('ttsAudio');
const ttsTextPreview    = document.getElementById('ttsTextPreview');
const btnDownloadAudio  = document.getElementById('btnDownloadAudio');
const btnCopyAudioUrl   = document.getElementById('btnCopyAudioUrl');
const btnClearAudio     = document.getElementById('btnClearAudio');
const ttsWaveform       = document.getElementById('ttsWaveform');
let currentAudioUrl = null;
let selectedVoice  = 'male-qn-qingse';
let isSynthesizing = false;

// Build waveform bars
(function buildWaveform() {
  for (let i = 0; i < 48; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = (Math.random() * 20 + 6) + 'px';
    ttsWaveform.appendChild(bar);
  }
})();

ttsText.addEventListener('input', () => {
  const len = ttsText.value.length;
  ttsCharCount.textContent = len + ' / 3000';
  ttsCharCount.style.color = len > 3000 ? 'var(--warning)' : '';
});
ttsSpeed.addEventListener('input', () => {
  ttsSpeedVal.textContent = parseFloat(ttsSpeed.value).toFixed(1) + 'x';
});

voiceGrid.addEventListener('click', e => {
  const b = e.target.closest('.voice-btn');
  if (!b) return;
  document.querySelectorAll('.voice-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  selectedVoice = b.dataset.voice;
});

// TTS debounced synthesize
const debouncedSynthesize = debounce(function() {
  if (isSynthesizing) return;
  const text = ttsText.value.trim();
  if (!text) { showToast('请输入文本内容', 'warning'); ttsText.focus(); return; }
  if (text.length > 3000) { showToast('文本不能超过 3000 字', 'warning'); return; }

  isSynthesizing = true;
  btnSynthesize.disabled = true;
  btnSynthesize.innerHTML = '<span class="btn-spinner"></span> 合成中...';
  btnSynthesize.classList.add('loading');

  apiCall('/api/tts', {
    model: 'speech-2.8-hd',
    text,
    voice_setting: {
      voice_id: selectedVoice,
      speed: Math.min(2.0, Math.max(0.5, parseFloat(ttsSpeed.value) || 1.0)),
    },
    output_format: 'url',
  }).then(data => {
    const url = data.audio_url;
    if (!url) throw new Error('未返回音频地址');
    currentAudioUrl = url;
    ttsTextPreview.textContent = text;
    ttsAudio.src = url;
    ttsPlaceholder.style.display = 'none';
    ttsPlayer.style.display = 'flex';
    showToast('语音合成成功', 'success');
  }).catch(err => {
    showToast(err.message || '合成失败');
  }).finally(() => {
    isSynthesizing = false;
    btnSynthesize.disabled = false;
    btnSynthesize.innerHTML = '✦ 开始合成语音';
    btnSynthesize.classList.remove('loading');
  });
}, 300);

btnSynthesize.addEventListener('click', debouncedSynthesize);
ttsText.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); debouncedSynthesize(); } });

btnDownloadAudio.addEventListener('click', async () => {
  if (!currentAudioUrl) return;
  try {
    const r = await fetch(currentAudioUrl);
    const b = await r.blob();
    const u = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href = u; a.download = 'ai-voice-' + Date.now() + '.mp3'; a.click();
    URL.revokeObjectURL(u);
    showToast('下载成功', 'success');
  } catch { showToast('下载失败'); }
});

btnCopyAudioUrl.addEventListener('click', () => {
  if (!currentAudioUrl) return;
  navigator.clipboard.writeText(currentAudioUrl)
    .then(() => showToast('链接已复制', 'success'))
    .catch(() => showToast('复制失败'));
});

btnClearAudio.addEventListener('click', () => {
  ttsAudio.src = '';
  currentAudioUrl = null;
  ttsPlayer.style.display = 'none';
  ttsPlaceholder.style.display = 'flex';
});

// ============================================================
// Gallery
// ============================================================
const gallerySearch     = document.getElementById('gallerySearch');
const galleryCatFilters = document.getElementById('galleryCatFilters');
const galleryGrid       = document.getElementById('galleryGrid');
const galleryCount      = document.getElementById('galleryCount');
const galleryModal      = document.getElementById('galleryModal');
const modalTitle        = document.getElementById('modalTitle');
const modalMeta         = document.getElementById('modalMeta');
const modalPrompt       = document.getElementById('modalPrompt');
const modalClose        = document.getElementById('modalClose');
const modalUseCn        = document.getElementById('modalUseCn');
const modalUseEn        = document.getElementById('modalUseEn');

let allPrompts = [], activeCategory = 'all', searchQuery = '', currentModalPrompt = '', currentPromptId = null;

const catLabels = { portrait:'📸肖像', fashion:'👗时尚', product:'📦产品', '3d':'🎨3D渲染', fantasy:'🐉奇幻', anime:'🎭动漫', landscape:'🏔️风景', logo:'🏷️Logo', cyberpunk:'🌃赛博朋克', vintage:'📻复古', painting:'🖼️绘画', steampunk:'⚙️蒸汽朋克', minimalist:'⬜极简', food:'🍜美食', character:'👤人物', comics:'📚漫画', chinese:'🇨🇳中式', other:'📎其他' };
const catColors = { portrait:'#ec4899', fashion:'#f43f5e', product:'#8b5cf6', '3d':'#06b6d4', fantasy:'#f59e0b', anime:'#ec4899', landscape:'#22c55e', logo:'#3b82f6', cyberpunk:'#8b5cf6', vintage:'#78716c', painting:'#e879f9', steampunk:'#d97706', minimalist:'#94a3b8', food:'#f97316', character:'#f43f5e', comics:'#6366f1', chinese:'#ef4444', other:'#64748b' };

const debouncedGallerySearch = debounce(() => { searchQuery = gallerySearch.value; renderGallery(); }, 200);

async function loadPrompts() {
  try {
    const r = await fetch('./prompts.json');
    const d = await r.json();
    allPrompts = d.prompts || [];
    renderCategoryFilters(d.categories || []);
    renderGallery();
  } catch(e) {
    galleryGrid.innerHTML = '<div class="gallery-loading">加载失败，请刷新重试</div>';
  }
}

function renderCategoryFilters(cats) {
  const all = ['all', ...cats];
  galleryCatFilters.innerHTML = all.map(c =>
    '<button class="gallery-cat-btn' + (c==='all'?' active':'') + '" data-cat="' + escapeHtml(c) + '">' + (c==='all'?'🌐全部':escapeHtml(catLabels[c]||c)) + '</button>'
  ).join('');
  galleryCatFilters.querySelectorAll('.gallery-cat-btn').forEach(b => b.addEventListener('click', () => {
    activeCategory = b.dataset.cat;
    galleryCatFilters.querySelectorAll('.gallery-cat-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    renderGallery();
  }));
}

function filterPrompts() {
  return allPrompts.filter(p => {
    const mc = activeCategory === 'all' || p.categories.includes(activeCategory);
    const q = searchQuery.toLowerCase();
    const ms = !q || p.title.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q);
    return mc && ms;
  });
}

function renderGallery() {
  const f = filterPrompts();
  galleryCount.textContent = '共 ' + f.length + ' / ' + allPrompts.length + ' 个提示词';
  if (f.length === 0) { galleryGrid.innerHTML = '<div class="gallery-loading">没有找到匹配的提示词</div>'; return; }
  galleryGrid.innerHTML = f.map(p => {
    const cats = p.categories.slice(0,3).map(c =>
      '<span class="gallery-cat-tag" style="border-color:' + (catColors[c]||'#8b5cf6') + '40;background:' + (catColors[c]||'#8b5cf6') + '15;color:' + (catColors[c]||'#8b5cf6') + '">' + escapeHtml(catLabels[c]||c) + '</span>'
    ).join('');
    const preview = escapeHtml(p.prompt.substring(0,150)) + (p.prompt.length > 150 ? '...' : '');
    const hasCn = p.promptCn && p.promptCn.length > 20;
    const hasEn = p.promptEn && p.promptEn.length > 20;
    return '<div class="gallery-card" data-id="' + p.id + '">' +
      '<div class="gallery-card-header"><div class="gallery-card-title">' + escapeHtml(p.title) + '</div><div class="gallery-card-id">#' + p.id + '</div></div>' +
      '<div class="gallery-card-cats">' + cats + '</div>' +
      '<div class="gallery-card-preview">' + preview + '</div>' +
      '<div class="gallery-card-use">' +
        (hasCn ? '<button class="gallery-use-cn">📝中文</button>' : '') +
        (hasEn ? '<button class="gallery-use-en">🌐英文</button>' : '<button class="gallery-use-btn">📝使用</button>') +
      '</div>' +
    '</div>';
  }).join('');
}

galleryGrid.addEventListener('click', e => {
  const card = e.target.closest('.gallery-card');
  if (!card) return;
  const btn = e.target.closest('.gallery-use-cn, .gallery-use-en, .gallery-use-btn');
  const id = parseInt(card.dataset.id);
  const p = allPrompts.find(x => x.id === id);
  if (!p) return;
  const promptToUse = btn?.classList.contains('gallery-use-en') ? (p.promptEn || p.prompt) : (p.promptCn || p.prompt);
  if (btn?.classList.contains('gallery-use-cn') || btn?.classList.contains('gallery-use-en')) {
    activateTab('image');
    document.getElementById('imgPrompt').value = promptToUse;
    document.getElementById('imgCharCount').textContent = promptToUse.length + ' / 1500';
    showToast('提示词已填入！', 'success');
  } else {
    currentPromptId = p.id; currentModalPrompt = promptToUse;
    modalTitle.textContent = p.title;
    modalMeta.textContent = '#' + p.id + (p.source ? ' · 来源: ' + p.source : '');
    modalPrompt.textContent = promptToUse;
    modalUseCn.style.display = (p.promptCn && p.promptCn.length > 20) ? '' : 'none';
    modalUseEn.style.display = (p.promptEn && p.promptEn.length > 20) ? '' : 'none';
    galleryModal.classList.add('open');
  }
});

gallerySearch.addEventListener('input', debouncedGallerySearch);
modalClose.addEventListener('click', () => galleryModal.classList.remove('open'));
galleryModal.addEventListener('click', e => { if (e.target === galleryModal) galleryModal.classList.remove('open'); });

modalUseCn.addEventListener('click', () => {
  const p = allPrompts.find(x => x.id === currentPromptId);
  const t = p ? (p.promptCn || p.prompt) : currentModalPrompt;
  activateTab('image');
  galleryModal.classList.remove('open');
  document.getElementById('imgPrompt').value = t;
  document.getElementById('imgCharCount').textContent = t.length + ' / 1500';
  showToast('中文提示词已填入！', 'success');
});

modalUseEn.addEventListener('click', () => {
  const p = allPrompts.find(x => x.id === currentPromptId);
  const t = p ? (p.promptEn || p.prompt) : currentModalPrompt;
  activateTab('image');
  galleryModal.classList.remove('open');
  document.getElementById('imgPrompt').value = t;
  document.getElementById('imgCharCount').textContent = t.length + ' / 1500';
  showToast('英文提示词已填入！', 'success');
});

// Lazy-load gallery only when tab is first opened
const galleryNavBtn = document.querySelector('.nav-item[data-tab="gallery"]');
let galleryLoaded = false;
galleryNavBtn.addEventListener('click', () => { if (!galleryLoaded) { galleryLoaded = true; loadPrompts(); } });
</script>
